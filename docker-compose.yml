services:

  # ---------------------------------------------------------------------------
  # The database - a plain PostgreSQL instance.
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: bookstore_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Admin migrations - run by a DBA with superuser credentials.
  #
  # Responsibility: schema creation, role management, permission grants.
  # History is stored in the public schema so the superuser always has access.
  # ---------------------------------------------------------------------------
  migrate-admin:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ./db/admin/sql:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/bookstore_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres_password
      FLYWAY_DEFAULT_SCHEMA: public
      FLYWAY_TABLE: flyway_admin_history
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      # Passwords for the roles created in V2__create_roles.sql.
      # Change these values (or inject from CI/CD secrets) before deploying.
      FLYWAY_PLACEHOLDERS_APP_USER_PASSWORD: app_password
      FLYWAY_PLACEHOLDERS_REPORTING_USER_PASSWORD: reporting_password
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Dev migrations - run by a developer with application-level credentials.
  #
  # Responsibility: tables, views, indexes - all within the bookstore schema.
  # History is stored in the bookstore schema alongside the application objects.
  # ---------------------------------------------------------------------------
  migrate-dev:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ./db/dev/sql:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/bookstore_db
      FLYWAY_USER: app_user
      FLYWAY_PASSWORD: app_password
      FLYWAY_DEFAULT_SCHEMA: bookstore
      FLYWAY_TABLE: flyway_dev_history
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    depends_on:
      migrate-admin:
        condition: service_completed_successfully

services:

  # ---------------------------------------------------------------------------
  # The database - a plain PostgreSQL instance.
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Admin migrations - run by a DBA with superuser credentials.
  #
  # Responsibility: schema creation, role management, permission grants.
  # History is stored in the public schema so the superuser always has access.
  # ---------------------------------------------------------------------------
  migrate-admin:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ./db/admin/sql:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: ${DB_ADMIN_PASSWORD}
      FLYWAY_DEFAULT_SCHEMA: public
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_PLACEHOLDERS_APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      FLYWAY_PLACEHOLDERS_REPORTING_USER_PASSWORD: ${REPORTING_USER_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Bookstore migrations - run by the bookstore squad with app-level credentials.
  #
  # Responsibility: tables, views, indexes - all within the bookstore schema.
  # History is stored in the bookstore schema alongside the application objects.
  # ---------------------------------------------------------------------------
  migrate-bookstore:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ./db/bookstore/sql:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      FLYWAY_USER: app_user
      FLYWAY_PASSWORD: ${APP_USER_PASSWORD}
      FLYWAY_DEFAULT_SCHEMA: bookstore
      FLYWAY_LOCATIONS: filesystem:/flyway/sql/tables,filesystem:/flyway/sql/views
    depends_on:
      migrate-admin:
        condition: service_completed_successfully
